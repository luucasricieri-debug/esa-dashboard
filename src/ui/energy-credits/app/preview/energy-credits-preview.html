<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preview — Gestão de Créditos ESA Energia</title>
  <style>
    /* Reset mínimo */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #F7F5F0; }

    /* Barra de preview */
    #ec-preview-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 9999;
      height: 36px;
      background: #0D2418;
      color: #EEF5F1;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 12px;
      font-family: Inter, Arial, Helvetica, sans-serif;
      font-size: 11px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.35);
      transition: height 0.2s ease;
      overflow: hidden;
    }

    #ec-preview-bar.ec-pv-collapsed {
      height: 24px;
    }

    #ec-preview-bar.ec-pv-collapsed .ec-pv-routes {
      display: none;
    }

    .ec-pv-label {
      font-weight: 600;
      letter-spacing: 0.03em;
      white-space: nowrap;
      color: #C9940A;
      flex-shrink: 0;
    }

    .ec-pv-routes {
      display: flex;
      gap: 4px;
      flex-wrap: nowrap;
      overflow-x: auto;
    }

    .ec-pv-btn {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      color: #EEF5F1;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 10px;
      font-family: Inter, Arial, Helvetica, sans-serif;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }

    .ec-pv-btn:hover {
      background: rgba(255,255,255,0.15);
    }

    .ec-pv-btn.ec-pv-btn-active {
      background: #C9940A;
      border-color: #C9940A;
      color: #0D2418;
      font-weight: 700;
    }

    .ec-pv-collapse {
      margin-left: auto;
      background: none;
      border: none;
      color: #EEF5F1;
      cursor: pointer;
      font-size: 9px;
      padding: 2px 4px;
      flex-shrink: 0;
      opacity: 0.6;
    }

    .ec-pv-collapse:hover { opacity: 1; }

    /* App mount point */
    #ec-preview-root {
      position: fixed;
      top: 36px;
      left: 0;
      right: 0;
      bottom: 0;
    }
  </style>
</head>
<body>

  <!-- Barra de controles do preview -->
  <div id="ec-preview-bar"></div>

  <!-- Ponto de montagem da UI de Créditos ESA -->
  <div id="ec-preview-root"></div>

  <script type="module" src="./energy-credits-preview.js"></script>
</body>
</html>
